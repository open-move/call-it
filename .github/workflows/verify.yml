name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typescript:
    name: TypeScript, Web, And Operator Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: services/backend
        run: bun install --frozen-lockfile

      - name: Install keeper dependencies
        working-directory: services/keeper
        run: bun install --frozen-lockfile

      - name: Install operator dependencies
        working-directory: services/operator
        run: bun install --frozen-lockfile

      - name: Run repo verification
        run: bun run verify
