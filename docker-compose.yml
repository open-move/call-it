# Full CallIt stack. DeepBook Predict is remote (composed at runtime, not run here).
#
# Host ports are chosen to avoid clashes with common local services:
#   postgres       -> localhost:5439   (db: callit / callit / callit_backend)
#   backend API    -> http://localhost:8799
#   keeper status  -> http://localhost:8801
#   operator       -> no server (round runner)
#
# Bring up from the repo root:  docker-compose up -d --build
#
# DB credentials come from POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB (with
# local defaults) so they can be overridden via the deploy platform's env. Other
# per-service env comes from each service's .env (gitignored, optional) or the
# platform's injected env. The operator's deployment manifest is baked into its
# image (no bind-mount), so a contract redeploy needs an image rebuild.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-callit_backend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callit}
      POSTGRES_USER: ${POSTGRES_USER:-callit}
    healthcheck:
      interval: 5s
      retries: 10
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-callit} -d ${POSTGRES_DB:-callit_backend}"]
      timeout: 5s
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    volumes:
      # postgres:18 stores data under a versioned subdir; mount the parent.
      - callit-postgres:/var/lib/postgresql

  backend:
    build: ./services/backend
    command: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ./services/backend/.env
        required: false
    # Reach postgres over the compose network; credentials come from the same
    # POSTGRES_* env so the two stay in sync (set them in your deploy platform).
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-callit}:${POSTGRES_PASSWORD:-callit}@postgres:5432/${POSTGRES_DB:-callit_backend}
    ports:
      - "8799:8080"
    # Traefik routing for Coolify (api.trycallit.xyz -> container :8080). The
    # coolify-proxy shares this stack's network; these labels are what tell it
    # which host maps to which service. Ignored by plain `docker-compose up`.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.callit-api-http.entrypoints=http"
      - "traefik.http.routers.callit-api-http.rule=Host(`api.trycallit.xyz`)"
      - "traefik.http.routers.callit-api-http.middlewares=redirect-to-https"
      - "traefik.http.routers.callit-api-https.entrypoints=https"
      - "traefik.http.routers.callit-api-https.rule=Host(`api.trycallit.xyz`)"
      - "traefik.http.routers.callit-api-https.tls=true"
      - "traefik.http.routers.callit-api-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.callit-api-https.service=callit-api"
      - "traefik.http.services.callit-api.loadbalancer.server.port=8080"
    restart: unless-stopped

  operator:
    build: ./services/operator
    command: ["--watch", "--run-all"]
    env_file:
      - path: ./services/operator/.env
        required: false
    restart: unless-stopped

  web:
    build: ./web
    # SSR + static server. Talks to the backend/keeper over their public URLs
    # (baked into the bundle at build time from web/.env.production), so it
    # needs no compose-network links. Point trycallit.xyz at this service.
    environment:
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    # Traefik routing for Coolify (trycallit.xyz -> container :3000). This
    # service also declares the shared redirect-to-https middleware.
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.callit-web-http.entrypoints=http"
      - "traefik.http.routers.callit-web-http.rule=Host(`trycallit.xyz`)"
      - "traefik.http.routers.callit-web-http.middlewares=redirect-to-https"
      - "traefik.http.routers.callit-web-https.entrypoints=https"
      - "traefik.http.routers.callit-web-https.rule=Host(`trycallit.xyz`)"
      - "traefik.http.routers.callit-web-https.tls=true"
      - "traefik.http.routers.callit-web-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.callit-web-https.service=callit-web"
      - "traefik.http.services.callit-web.loadbalancer.server.port=3000"
    restart: unless-stopped

  keeper:
    build: ./services/keeper
    command: ["watch"]
    env_file:
      - path: ./services/keeper/.env
        required: false
    environment:
      KEEPER_HTTP_PORT: "8801"
      # Set KEEPER_STATUS_TOKEN in services/keeper/.env for production. With a
      # token configured, /healthz is the only unauthenticated keeper endpoint.
      # Fresh DB watches forward from now; set KEEPER_START_CHECKPOINT in .env to backfill.
      KEEPER_START_FROM_LATEST: "true"
    ports:
      - "8801:8801"
    # Traefik routing for Coolify (keeper-api.trycallit.xyz -> container :8801).
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.callit-keeper-http.entrypoints=http"
      - "traefik.http.routers.callit-keeper-http.rule=Host(`keeper-api.trycallit.xyz`)"
      - "traefik.http.routers.callit-keeper-http.middlewares=redirect-to-https"
      - "traefik.http.routers.callit-keeper-https.entrypoints=https"
      - "traefik.http.routers.callit-keeper-https.rule=Host(`keeper-api.trycallit.xyz`)"
      - "traefik.http.routers.callit-keeper-https.tls=true"
      - "traefik.http.routers.callit-keeper-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.callit-keeper-https.service=callit-keeper"
      - "traefik.http.services.callit-keeper.loadbalancer.server.port=8801"
    volumes:
      - callit-keeper:/app/data
    restart: unless-stopped

volumes:
  callit-keeper:
  callit-postgres:
