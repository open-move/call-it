services:
  backend:
    build: .
    command: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://callit:callit@postgres:5432/callit_backend
    # Host ports chosen to avoid clashes with common local services.
    ports:
      - "8799:8080"
    restart: unless-stopped

  backend-strategy-backfill:
    build: .
    command: ["strategy-backfill"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://callit:callit@postgres:5432/callit_backend
    profiles:
      - backfill
    restart: "no"

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: callit_backend
      POSTGRES_PASSWORD: callit
      POSTGRES_USER: callit
    healthcheck:
      interval: 5s
      retries: 10
      test: ["CMD-SHELL", "pg_isready -U callit -d callit_backend"]
      timeout: 5s
    ports:
      - "55432:5432"
    volumes:
      # postgres:18 stores data under a versioned subdir; mount the parent.
      - backend-postgres:/var/lib/postgresql

volumes:
  backend-postgres:
